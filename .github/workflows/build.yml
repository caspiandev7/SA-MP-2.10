name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'

      # Əgər doğrudan da React Native/Yarn istifadə edirsənsə bu qalsın, 
      # amma SAMP launcherlər üçün adətən lazım olmur. Lazımdırsa aktiv edərsən.
      # - name: Install Dependencies
      #   run: yarn install

      - name: Avtomatik Tap və Build Et (KÖKDƏN HƏLL)
        run: |
          echo "🔍 Proyekt daxilində gradlew faylı axtarılır..."
          
          # Bütün qovluqlarda 'gradlew' faylını axtarıb tapırıq
          GRADLE_PATH=$(find . -name "gradlew" | head -n 1)
          
          if [ -z "$GRADLE_PATH" ]; then
            echo "❌ XƏTA: 'gradlew' faylı heç bir qovluqda tapılmadı! Repository-ni tam yüklədiyinə əmin ol."
            exit 1
          fi
          
          # Tapdığımız faylın yerləşdiyi qovluğu müəyyən edirik
          GRADLE_DIR=$(dirname "$GRADLE_PATH")
          echo "✅ Android proyekti bu qovluqda tapıldı: $GRADLE_DIR"
          
          # Həmin qovluğa daxil oluruq və build edirik
          cd "$GRADLE_DIR"
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: APK-nı Yüklə (Upload)
        uses: actions/upload-artifact@v4
        with:
          name: SAMP-Launcher-APK
          # APK harda yaranırsa yaransın, bu kod onu tapıb sənə verəcək!
          path: "**/*.apk" 
